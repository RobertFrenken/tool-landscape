spec_version: "2"

project:
  name: tool-landscape
  description: "Developer tool evaluation framework — DuckDB backend, Python CLI, web frontend"
  team_size: 1

environment:
  primary: local            # GitHub Pages deploy, local dev
  secondary: [hpc]          # runs on OSC login nodes too
  gpu_required: false
  internet_on_compute: true

stack_pins: [DuckDB, D3.js, Python, Pydantic, ruff, pytest, Hatch, GitHub Actions]

invariant_pins: [DuckDB, D3.js, Python, Pydantic, ruff, pytest, Hatch, GitHub Actions]

components:
  # ── Frontend (the Phase I decision) ────────────────────────────────
  site_framework:
    description: "Host for /shop interactive page + existing 5 static pages"
    current_tool: Observable Framework
    require:
      categories: [meta_framework, static_site]
      open_source: true
    prefer:
      capability_ceiling: {value: extensive, weight: 4}
      community_momentum: {value: growing, weight: 3}
      documentation_quality: {value: excellent, weight: 3}
      lock_in_risk: {value: low, weight: 4}
      resource_overhead: {value: minimal, weight: 3}
    notes:
      - "Must support DuckDB-WASM queries from client-side JS"
      - "Must deploy to GitHub Pages as static site"
      - "Existing 5 pages are Observable markdown cells — migration cost matters"
    triggers:
      - "Interactive form-heavy pages fight Observable's implicit reactivity model"
      - "Need component encapsulation for complex nested state (spec builder)"

  visualization:
    description: "Charting, graph viz, force-directed layouts for tool relationships"
    current_tool: D3.js
    require:
      categories: [visualization]
      open_source: true
    prefer:
      capability_ceiling: {value: extensive, weight: 5}
      community_momentum: {value: growing, weight: 2}
      lock_in_risk: {value: low, weight: 3}
    notes:
      - "Force-directed graph with 1000+ nodes"
      - "Custom SVG rendering, not just chart templates"
    triggers:
      - "Need WebGL/Canvas for 5000+ node rendering"

  ui_framework:
    description: "Component model for interactive spec builder widget on /shop page"
    require:
      categories: [frontend, ui_framework]
      open_source: true
    prefer:
      capability_ceiling: {value: extensive, weight: 3}
      community_momentum: {value: growing, weight: 4}
      resource_overhead: {value: minimal, weight: 5}
      lock_in_risk: {value: low, weight: 4}
      documentation_quality: {value: excellent, weight: 3}
    notes:
      - "Must work embedded inside Observable Framework pages OR as standalone"
      - "Bundle size matters — this is one interactive widget, not a full SPA"
      - "Needs form state management for nested spec objects"
      - "Must coexist with DuckDB-WASM and D3.js"
    triggers:
      - "Widget complexity outgrows vanilla JS class"

  query_engine:
    description: "Client-side SQL for filtering 1157 tools by spec constraints"
    current_tool: DuckDB
    require:
      categories: [query_engine, database]
      open_source: true
      offline_capable: true
    prefer:
      capability_ceiling: {value: extensive, weight: 5}
      community_momentum: {value: growing, weight: 3}
    notes:
      - "DuckDB-WASM already loaded on all pages, queries Parquet files"
      - "Same SQL predicates as Python shop.py backend"

  graph_analytics:
    description: "Louvain clustering, neighborhood computation"
    current_tool: NetworkX
    require:
      categories: [graph_analytics]
      open_source: true
    prefer:
      capability_ceiling: {value: extensive, weight: 3}
      community_momentum: {value: growing, weight: 2}

  build_tool:
    description: "JS bundling for site assets, pre-bundling components"
    require:
      categories: [build_tool]
      open_source: true
    prefer:
      community_momentum: {value: growing, weight: 4}
      resource_overhead: {value: minimal, weight: 4}
    notes:
      - "Observable Framework has built-in bundler but may need esbuild for pre-bundling components"
      - "Must handle DuckDB-WASM's Node built-in imports"

  config_management:
    description: "Pydantic v2 for spec validation and typed models"
    current_tool: Pydantic
    require:
      categories: [config_management]
      open_source: true
      offline_capable: true
    prefer:
      capability_ceiling: {value: extensive, weight: 4}

  package_management:
    description: "Python package build + dependency management"
    current_tool: Hatch
    require:
      categories: [package_management]
      open_source: true

# ── v2: Data pipeline topology ─────────────────────────────────────────────

data_flow:
  stages:
    - name: collection
      description: "Curate tool catalogs as JSON seed files"
      tools: [Python]
      outputs: [json]
    - name: storage
      description: "Rebuild DuckDB from seed data"
      tools: [DuckDB, Python]
      inputs: [json]
      outputs: [duckdb_tables]
    - name: analysis
      description: "Compute neighborhoods, fitness, recommendations"
      tools: [Python, DuckDB]
      inputs: [duckdb_tables]
      outputs: [duckdb_tables]
    - name: export
      description: "Export tables to Parquet for frontend"
      tools: [Python, DuckDB]
      inputs: [duckdb_tables]
      outputs: [parquet_files]
    - name: serving
      description: "Build static site with DuckDB-WASM"
      tools: [Observable Framework, DuckDB-WASM]
      inputs: [parquet_files]
      outputs: [arrow_tables]
    - name: presentation
      description: "Render interactive dashboard"
      tools: [Observable Framework, D3.js, Observable Plot]
      inputs: [arrow_tables]
      outputs: [dom_elements]
  boundaries:
    - between: [storage, analysis]
      friction: low
      notes: "Same Python process, DuckDB native"
    - between: [analysis, export]
      friction: low
      notes: "DuckDB COPY TO parquet, trivial"
    - between: [export, serving]
      friction: medium
      notes: "File handoff; must re-run export when data changes"
    - between: [serving, presentation]
      friction: high
      notes: "Arrow proxy impedance, SQL string interpolation, no execution ordering"

# ── v2: Time horizon ───────────────────────────────────────────────────────

time_horizon:
  planned_work:
    - description: "Interactive shop page with nested form state"
      timeframe: "2026-Q1"
      components_affected: [site_framework, ui_framework]
      complexity: high
    - description: "Stack comparison wizard"
      timeframe: "2026-Q2"
      components_affected: [site_framework, ui_framework]
      complexity: medium
  ceiling_timeline:
    site_framework: "2026-Q2"
    visualization: "2027+"
    query_engine: "2027+"
  evolution:
    site_framework: product
    visualization: product
    query_engine: product
    build_tool: commodity

# ── v2: Migration economics ────────────────────────────────────────────────

migration:
  one_time:
    site_framework:
      effort_hours: 16
      risk: low
      reversibility: full
  ongoing_friction:
    site_framework:
      hours_per_week: 1.5
      trend: increasing
      notes: "Arrow proxy workarounds, no component encapsulation, keystroke reactivity"

# ── v2: Candidate stacks ───────────────────────────────────────────────────

candidate_stacks:
  current:
    site_framework: Observable Framework
    ui_framework: null
    build_tool: Observable Framework
    visualization: D3.js
    query_engine: DuckDB-WASM
  astro_svelte:
    site_framework: Astro
    ui_framework: Svelte
    build_tool: Vite
    visualization: D3.js
    query_engine: DuckDB-WASM
  sveltekit:
    site_framework: SvelteKit
    ui_framework: Svelte
    build_tool: Vite
    visualization: D3.js
    query_engine: DuckDB-WASM

stack_boundary_overrides:
  astro_svelte:
    - between: [serving, presentation]
      friction: medium
      notes: "Svelte components have explicit state, standard DOM APIs, no Arrow proxy"
  sveltekit:
    - between: [serving, presentation]
      friction: medium
      notes: "SvelteKit has standard component model, no Arrow proxy impedance"
