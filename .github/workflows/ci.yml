name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: uv venv .venv && uv pip install -e ".[dev]" --python .venv/bin/python

      - name: Lint
        run: .venv/bin/ruff check landscape/ tests/

      - name: Format check
        run: .venv/bin/ruff format --check landscape/ tests/

      - name: Validate catalogs
        run: .venv/bin/python scripts/validate_catalogs.py

      - name: Run tests
        run: .venv/bin/pytest tests/ -v
